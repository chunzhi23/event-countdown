<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jongmin Lee</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.css"
      integrity="sha512-NzqTHTrO48HsIamogmIaVhTXoSgRF24Cn+ynrNYrFuKrY0AdDbmcNieiOHsQARS/r0Gax9VwV3/rVMHs3ipUlg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="shortcut icon" href="./assets/icon/favicon.ico" />
  </head>
  <body>
    <div id="wrap">
      <!-- Screen-centered area -->
      <div id="container">
        <!-- Left side of the entire screen that shows a countdown status -->
        <div id="countdownBox">
          <!-- Timestamp -->
          <div id="timeBox">
            <!-- Days -->
            <div id="dayElement" class="time-element">
              <span class="title">Days</span>
              <span id="dayValTxt" class="value">548</span>
            </div>
            <div class="time-divider">:</div>
            <!-- Hours -->
            <div id="hourElement" class="time-element">
              <span class="title">Hours</span>
              <span id="hourValTxt" class="value">00</span>
            </div>
            <div class="time-divider">:</div>
            <!-- Minutes -->
            <div id="minuteElement" class="time-element">
              <span class="title">Minutes</span>
              <span id="minuteValTxt" class="value">00</span>
            </div>
            <div class="time-divider">:</div>
            <!-- Seconds -->
            <div id="secondElement" class="time-element">
              <span class="title">Seconds</span>
              <span id="secondValTxt" class="value">00</span>
            </div>
          </div>
          <!-- Progress -->
          <div id="progressBox">
            <!-- Progress bar screen -->
            <div id="progressBar">
              <!-- Progress bar projector -->
              <div id="progressStatus">0%</div>
            </div>
            <!-- Show the end date of the countdown -->
            <span id="dueTxt">2027.02.03</span>
          </div>
        </div>
        <!-- Right side of the entire screen that shows a customized icon -->
        <div id="iconBox">
          <img src="./assets/img/flag_of_korea.jpg" alt="Flag of South Korea" />
        </div>
      </div>
      <!-- Show a customized user message -->
      <div id="messageBox">SEE YOU THEN</div>
    </div>
    <script src="./js/app.js"></script>
  </body>
</html>
